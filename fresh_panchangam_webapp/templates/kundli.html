<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kundli Generator</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        h1 { text-align: center; }
        form { max-width: 400px; margin: 0 auto; }
        label { display: block; margin-top: 1em; }
        input, select { width: 100%; padding: 0.5em; margin-top: 0.2em; }
        button { margin-top: 1em; padding: 0.7em 1.5em; }
        pre { background: #eee; padding: 1em; border-radius: 5px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Kundli Generator</h1>
    <form id="kundliForm">
        <label>Date of Birth: <input type="date" name="date" required></label>
        <label>Time of Birth: <input type="time" name="time" required></label>
        <label>Location:
            <input type="text" id="location-search" placeholder="Type to search..." autocomplete="off" required>
            <div id="autocomplete-list"></div>
        </label>
        <input type="hidden" name="lat" id="lat">
        <input type="hidden" name="lon" id="lon">
        <label>Timezone (e.g. 5.5): <input type="number" name="tz" id="tz" step="any" required></label>
        <button type="submit">Generate Kundli</button>
    </form>
    <div id="kundli-container" class="kundli-container"></div>
    <pre id="kundli-json"></pre>
    <script>
        let places = [];
        fetch('/get_places').then(r => r.json()).then(data => { places = data.places; });
        
        const locationInput = document.getElementById('location-search');
        const autocompleteList = document.getElementById('autocomplete-list');

        locationInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            autocompleteList.innerHTML = '';
            if (!val) return;
            const matches = places.filter(p => p.name.toLowerCase().includes(val));
            matches.slice(0, 10).forEach(place => {
                const div = document.createElement('div');
                div.textContent = place.name;
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    locationInput.value = place.name;
                    document.getElementById('lat').value = place.lat;
                    document.getElementById('lon').value = place.lon;
                    document.getElementById('tz').value = place.TZFloat || 5.5;
                    autocompleteList.innerHTML = '';
                };
                autocompleteList.appendChild(div);
            });
        });

        function renderKundliChart(data) {
            const container = document.getElementById('kundli-container');
            
            // Planet symbols mapping
            const planetSymbols = {
                'Sun': '☉',
                'Moon': '☽',
                'Mars': '♂',
                'Mercury': '☿',
                'Jupiter': '♃',
                'Venus': '♀',
                'Saturn': '♄',
                'Rahu (Mean)': '☊',
                'Ketu (Mean)': '☋'
            };
            
            // House positions for North Indian diamond chart
            const housePositions = {
                1: { left: '281px', top: '107px', width: '232px', height: '215px' },
                2: { left: '457px', top: '42px', width: '110px', height: '173px' },
                3: { left: '282px', top: '0px', width: '282px', height: '83px' },
                4: { left: '165px', top: '0px', width: '232px', height: '215px' },
                5: { left: '0px', top: '0px', width: '282px', height: '83px' },
                6: { left: '0px', top: '42px', width: '110px', height: '173px' },
                7: { left: '50px', top: '107px', width: '232px', height: '215px' },
                8: { left: '0px', top: '210px', width: '110px', height: '220px' },
                9: { left: '0px', top: '347px', width: '282px', height: '83px' },
                10: { left: '165px', top: '215px', width: '232px', height: '215px' },
                11: { left: '282px', top: '347px', width: '282px', height: '83px' },
                12: { left: '457px', top: '210px', width: '110px', height: '220px' }
            };
            
            // Group planets by house
            const planetsByHouse = {};
            for (let i = 1; i <= 12; i++) {
                planetsByHouse[i] = [];
            }
            
            // Add planets to their houses
            Object.keys(data.planets).forEach(planet => {
                const planetData = data.planets[planet];
                if (planetData.house) {
                    planetsByHouse[planetData.house].push({
                        name: planet,
                        symbol: planetSymbols[planet] || planet,
                        sign: planetData.sign,
                        deg: planetData.deg
                    });
                }
            });
            
            // Create the chart HTML
            let chartHTML = '<h2>Kundli Chart</h2>';
            chartHTML += '<div class="kundli-chart" style="width: 567px; height: 430px; position: relative; margin: 0 auto; border: none; background: transparent;">';
            
            // Create houses
            for (let houseNum = 1; houseNum <= 12; houseNum++) {
                const pos = housePositions[houseNum];
                const planets = planetsByHouse[houseNum];
                const bhava = data.bhavas.find(b => b.house === houseNum);
                
                chartHTML += `<div class="house house-${houseNum}" style="
                    position: absolute;
                    left: ${pos.left};
                    top: ${pos.top};
                    width: ${pos.width};
                    height: ${pos.height};
                    border: none;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    padding: 5px;
                    background: transparent;
                ">`;
                
                // Sign name
                if (bhava) {
                    chartHTML += `<div style="
                        position: absolute; 
                        bottom: 2px; 
                        left: 2px; 
                        font-size: 11px; 
                        color: #8B0000;
                        font-weight: bold;
                    ">${bhava.sign.split(' ')[0]}</div>`;
                }
                
                // Planets in this house
                if (planets.length > 0) {
                    chartHTML += '<div style="display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 4px;">';
                    planets.forEach(planet => {
                        chartHTML += `<div style="
                            text-align: center;
                            font-size: 12px;
                            font-weight: bold;
                            color: #8B0000;
                            background: transparent;
                            padding: 3px 6px;
                            border-radius: 4px;
                            border: none;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            gap: 2px;
                        " title="${planet.name} in ${planet.sign} (${planet.deg.toFixed(1)}°)">
                            <div style="font-size: 18px; color: #8B0000;">${planet.symbol}</div>
                            <div style="font-size: 10px; color: #8B0000; font-weight: bold;">${planet.name.split(' ')[0]}</div>
                            <div style="font-size: 8px; color: #666;">${planet.deg.toFixed(1)}°</div>
                        </div>`;
                    });
                    chartHTML += '</div>';
                }
                
                chartHTML += '</div>';
            }
            
            chartHTML += '</div>';
            
            container.innerHTML = chartHTML;
        }

        document.getElementById('kundliForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const body = {
                date: form.date.value, time: form.time.value,
                lat: form.lat.value, lon: form.lon.value, tz: form.tz.value
            };
            const resp = await fetch('/api/kundli', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const result = await resp.json();
            document.getElementById('kundli-json').textContent = JSON.stringify(result, null, 2);
            if (!result.error) {
                renderKundliChart(result);
            }
        });
    </script>
</body>
</html>
